<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hero page</title>
    <style>
        body, h5 {
            padding: 0;
            margin: 0;
            font-family: Arial;
        }
        .hero{
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            background-color: rgba(210, 48, 48, 0.144);
            background-image: linear-gradient(to right, rgba(255, 0, 0, 0.288), rgba(0, 0, 255, 0.447));
            color: white;
            font-size: 6em;
            position: relative;
            min-height: 100vh;
            overflow: hidden;
        }

        .video-bg{
            position: absolute;
            bottom: 0;
            left: 0;
            min-height: 100%;
            min-width: 100%;
            z-index: -1;

        }
    </style>
</head>
<body>
    <div class="hero">
        <h5>rifa syahida, makanan sehat</h5>
        <video 
            src="media/6.mp4" class="video-bg" autoplay muted loop></video>    
    </div>
</body>
</html>
